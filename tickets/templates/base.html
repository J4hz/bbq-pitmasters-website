<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BBQ PITMASTERS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              charcoal: "#1f2933", // slightly lighter, blue-charcoal tone
              burnt: "#D35400",
              cream: "#F4ECD8",
            },
            fontFamily: {
              sans: ["Inter", "system-ui", "-apple-system", "BlinkMacSystemFont", "sans-serif"],
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-full bg-charcoal text-cream font-sans">
    <div class="min-h-screen flex flex-col">
      <header class="border-b border-burnt/20 bg-black/40 backdrop-blur">
        <div class="mx-auto max-w-6xl px-4 py-4 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="h-9 w-9 rounded-full bg-gradient-to-br from-burnt to-orange-500 flex items-center justify-center">
              <span class="text-sm font-semibold tracking-tight">BBQ</span>
            </div>
            <div>
              <div class="font-semibold tracking-wide uppercase text-xs text-cream/90">BBQ PITMASTERS</div>
              <p class="text-xs text-cream/65">
                <i class="fa-solid fa-fire-flame-curved text-burnt mr-1"></i>
                Family-style live-fire dinners
              </p>
            </div>
          </div>
          <nav class="hidden md:flex items-center gap-6 text-[11px] text-cream/70">
            <a href="/#pitmasters" class="hover:text-cream/95">PitMasters</a>
            <a href="/#how-it-works" class="hover:text-cream/95">How it works</a>
          </nav>
        </div>
      </header>
      <main class="flex-1">
        {% block content %}{% endblock %}
      </main>
      <footer class="border-t border-burnt/20 bg-black/40">
        <div class="mx-auto max-w-6xl px-4 py-4 text-xs text-cream/60 flex justify-between items-center">
          <span>&copy; {% now "Y" %} BBQ PITMASTERS</span>
          <span>Crafted for unforgettable live-fire experiences.</span>
        </div>
      </footer>
    </div>
  </body>
</html>
